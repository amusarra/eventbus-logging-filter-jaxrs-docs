# Workflow per la build di AsciiDoc in HTML5 e la produzione dell'artifact.
# NOTA: Il deploy su GitHub Pages è gestito esclusivamente dal workflow build_antora_site.yml
# che usa Antora come deployment principale. Questo workflow genera solo l'artifact HTML5.
name: Build AsciiDoc to HTML5 (artifact only)

on:
  push:
    branches: ["main"]
    paths:
      - 'src/main/docs/**'
      - 'pom.xml'

  workflow_dispatch:

# Permessi minimi: solo lettura del repository (nessun deploy su Pages)
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: 11
          distribution: 'corretto'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Verify Mermaid CLI installation
        run: mmdc --version

      - name: Convert AsciiDoc to HTML5
        run: |
          mvn clean asciidoctor:process-asciidoc@asciidoc-to-html

      - name: Upload HTML5 artifact
        uses: actions/upload-artifact@v4
        with:
          name: asciidoc-html5
          path: './target/generated-html5'
          retention-days: 30
